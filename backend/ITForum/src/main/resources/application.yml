spring:
  application:
    name: ITForum

  profiles:
    active: dev

  sql:
    init:
      mode: never

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

  datasource:
    url: jdbc:mysql://localhost:3306/it_forum?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: ${DB_PASSWORD:2523427030mc}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000

  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:}
      database: 0
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 2
      timeout: 3000ms

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    listener:
      simple:
        concurrency: 3
        max-concurrency: 10
        prefetch: 10
    template:
      retry:
        enabled: true
        initial-interval: 3s
        max-attempts: 3
        multiplier: 2

mybatis:
  type-aliases-package: luxaeterna.itforum.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: ${JWT_SECRET:it-forum-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256}
  expiration: 86400000
  refresh-expiration: 604800000

file:
  upload:
    path: D:/BYSJ/uploads
    allowed-image-types: jpg,jpeg,png,gif,webp
    allowed-file-types: pdf,zip,txt,md,doc,docx
    max-file-size: 10485760

ai:
  openai:
    api-key: ${OPENAI_API_KEY:none}
    base-url: ${OPENAI_BASE_URL:https://api.deepseek.com}
    model: ${AI_MODEL:deepseek-v4-flash}
    temperature: 0.7
    max-tokens: 4096
    timeout: 60
  moderation:
    enabled: true
    model: ${AI_MODERATION_MODEL:deepseek-v4-flash}
    temperature: 0.1
  polish:
    enabled: true
    model: ${AI_POLISH_MODEL:deepseek-v4-flash}
    temperature: 0.7
    max-tokens: 2048
  agent:
    enabled: true
    model: ${AI_AGENT_MODEL:deepseek-v4-flash}
    temperature: 0.8
    max-tokens: 2048

forum:
  post:
    page-size: 20
    max-title-length: 200
    max-content-length: 50000
  comment:
    max-depth: 3
    page-size: 50
    max-content-length: 5000
